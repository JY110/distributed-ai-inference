version: '3.8'

services:
  # Nginx 负载均衡
  nginx:
    image: nginx:alpine
    ports:
      - "50051:50051"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - inference-server-1
      - inference-server-2
    restart: always
    networks:
      - inference-network

  # 推理服务节点1
  inference-server-1:
    build: .
    ports:
      - "50052:50051"
    volumes:
      - ./models:/models:ro
    environment:
      - TZ=Asia/Shanghai
    restart: always
    networks:
      - inference-network
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "4G"

  # 推理服务节点2
  inference-server-2:
    build: .
    ports:
      - "50053:50051"
    volumes:
      - ./models:/models:ro
    environment:
      - TZ=Asia/Shanghai
    restart: always
    networks:
      - inference-network
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "4G"

  # 可选：Redis 缓存
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always
    networks:
      - inference-network

networks:
  inference-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
