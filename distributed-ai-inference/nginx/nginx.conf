user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    #tcp_nopush on;

    keepalive_timeout 65;

    #gzip on;

    upstream inference_servers {
        # 轮询策略
        server inference-server-1:50051 max_fails=3 fail_timeout=30s;
        server inference-server-2:50051 max_fails=3 fail_timeout=30s;
        
        # 加权轮询策略 (如果需要)
        # server inference-server-1:50051 weight=2 max_fails=3 fail_timeout=30s;
        # server inference-server-2:50051 weight=1 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 50051 http2;
        server_name localhost;

        # gRPC 代理配置
        location / {
            grpc_pass grpc://inference_servers;
            grpc_read_timeout 300s;
            grpc_send_timeout 300s;
            
            # 健康检查
            health_check interval=5s fails=3 passes=2;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
